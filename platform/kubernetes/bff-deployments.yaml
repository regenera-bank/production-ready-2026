apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-bff
  namespace: regenera-bank
  labels:
    app: web-bff
    tier: bff
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-bff
  template:
    metadata:
      labels:
        app: web-bff
        tier: bff
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: web-bff
          image: regenera/web-bff:latest
          ports:
            - name: http
              containerPort: 3200
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3200"
            - name: CORE_API_BASE_URL
              value: http://core-bank:3100/v1
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: regenera-database
                  key: url
            - name: JWT_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: regenera-jwt
                  key: session
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 25
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /v1/health/integrations
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: web-bff
  namespace: regenera-bank
spec:
  selector:
    app: web-bff
  ports:
    - port: 3200
      targetPort: http
---
