name: Core Banking CI

on:
  push:
    paths:
      - 'domains/core-bank/**'
      - '.github/workflows/core-bank-ci.yml'
  pull_request:
    paths:
      - 'domains/core-bank/**'
      - '.github/workflows/core-bank-ci.yml'

defaults:
  run:
    working-directory: domains/core-bank

jobs:
  test:
    name: NestJS + invariantes Money
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build