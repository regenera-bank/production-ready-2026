openapi: 3.1.0
info:
  title: Regenera pix API
  version: 1.0.0
servers:
  - url: https://api.regenera.example/v1
paths:
  /pix/health:
    get:
      operationId: getPixHealth
      responses:
        '200':
          description: available
components:
  parameters:
    CorrelationId:
      in: header
      name: X-Correlation-ID
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema: { type: string, minLength: 16, maxLength: 128 }
