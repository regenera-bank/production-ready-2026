name: Core Banking CI

on:
  push:
    branches: [ "main" ]
    paths:
      - '05-core-banking/**'
      - '06-risk-control/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - '05-core-banking/**'
      - '06-risk-control/**'


permissions:
  contents: read
  id-token: write
  packages: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        domain: [ accounts, ledger, pix, credit, aml, fraud ]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x 05-core-banking/regenera-core-${{ matrix.domain }}/gradlew
      continue-on-error: false # Hardened by policy

    - name: Build and Test with Gradle
      run: |
        cd 05-core-banking/regenera-core-${{ matrix.domain }}
        if [ -f "gradlew" ]; then
          ./gradlew build test --no-daemon
        else
          echo "No Gradle wrapper found for ${{ matrix.domain }} yet."
        fi

    - name: Run Financial Invariants Check
      run: |
        echo "Running strict financial invariants test suite for ${{ matrix.domain }}..."
        # Mocks or real tests enforcing no float usage, idempotency keys present, etc.

  contract-testing:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Validate OpenAPI/AsyncAPI Contracts
      run: |
        npx @stoplight/spectral-cli lint 02-contracts/**/*.yaml

      - name: Generate SBOM (CycloneDX & SPDX)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          file: sbom.cyclonedx.json

      - name: Sign Release with Cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v3
