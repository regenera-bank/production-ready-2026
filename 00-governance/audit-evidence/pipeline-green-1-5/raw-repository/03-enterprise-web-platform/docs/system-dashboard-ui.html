                        {/* Elegant vertical flow line */}
                        <div className="relative flex flex-col gap-8 flex-1">
                            <div className="absolute left-[45px] top-4 bottom-4 w-1 bg-gradient-to-b from-c-05 via-c-03 to-c-01 rounded opacity-20"></div>
                            
                            {[
                                { t: "01. PixPage: const txIdRef = useRef<string|null>(null); if(!txIdRef.current) txIdRef.current = crypto.randomUUID(); ... .headers({Idempotency-Key: txId})", d: "Frontend gera um UUID imutável (Idempotency-Key) ao montar a View de pagamento para evitar duplicatas.", col: "c-05", icon: "ph-shield-check" },
                                { t: "02. client.ts: getIdToken() + on 401 getIdToken(true). customAxiosInstance faz o mesmo. X-Trace-Id + X-Neural-Sync-ID em todo call.", d: "Client.ts puxa o IdToken fresco do SDK do Firebase e anexa ao Bearer Header junto com Traces de Logging.", col: "c-04", icon: "ph-database" },
                                { t: "03. auth.guard + firebase-admin.verifyIdToken. issueToken puxa customClaims.role. Neural JWT com claims para infra guards.", d: "NestJS no Cloud Run verifica assinatura com firebase-admin, recusa adulterações e inicia a pipeline interna.", col: "c-03", icon: "ph-plugs-connected" },
                                { t: "04. executePixAtomic: pre-check tx by idempotencyKey (retorna saldo atual sem reprocessar) -> withAccountTransaction -> setLock(pessimistic_write) -> save immutable tx.", d: "TransactionEntity insere a Key do client; TypeORM trava as linhas da conta e processa a transferência em Cents.", col: "c-02", icon: "ph-spinner-gap" },
                                { t: "05. mutation onSuccess: result.newBalanceCents -> updateBalanceCents(delta). txIdRef.current = null (só em business error). WS listener também atualiza authoritative.", d: "Resposta OK (200) devolve o 'newBalanceCents'. Estado do Zustand atualiza a interface passiva.", col: "c-01", icon: "ph-chart-polar" }
                            ].map((b, i) => (
                                <div key={i} className="flex items-center gap-8 group">
                                    {/* Number Badge with Line attachment */}
                                    <div className={`w-[90px] h-[75px] bg-${b.col}/10 border border-${b.col}/30 hover:border-${b.col}/80 rounded-2xl flex items-center justify-center shadow-lg shrink-0 relative z-10 transition-colors duration-300`}>
                                        <i className={`ph ${b.icon} text-${b.col} text-3xl`}></i>
                                    </div>
                                    <div className="max-w-[520px]">
                                        <h3 className="text-white font-bold text-xl mb-1 group-hover:text-white transition-colors">{b.t}</h3>
                                        <p className="text-gray-400 text-sm leading-relaxed">{b.d}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>

                <div className="relative z-30 shrink-0 slide-element delay-450">
                    <PhoneMockup activeAction={phoneAction} onActionSelect={setPhoneAction} />
                </div>
            </div>
        );

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [currentSlide, setCurrentSlide] = React.useState(0);
            const [phoneAction, setPhoneAction] = React.useState("Pix");
            const totalSlides = 6;
            const [scale, setScale] = React.useState(1);

            // Responsive scale lock for 1920x1080 viewport
            React.useEffect(() => {
                const handleResize = () => {
                    const wrapper = document.getElementById('app-wrapper');
                    if(wrapper) {
                        const scaleX = wrapper.clientWidth / 1920;
                        const scaleY = wrapper.clientHeight / 1080;
                        setScale(Math.min(scaleX, scaleY));
                    }
                };
                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // Keyboard binds
            React.useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'ArrowRight' || e.key === 'Space') nextSlide();
                    if (e.key === 'ArrowLeft') prevSlide();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [currentSlide]);

            const nextSlide = () => setCurrentSlide(prev => (prev + 1) % totalSlides);
            const prevSlide = () => setCurrentSlide(prev => (prev - 1 + totalSlides) % totalSlides);

            return (
                <div id="app-wrapper" className="relative select-none">
                    {/* Visual Ambience */}
                    <div className="neon-glow-1"></div>
                    <div className="neon-glow-2"></div>

                    {/* Scaled Slide Frame */}
                    <div className="slide-frame" style={{ transform: `scale(${scale})` }}>
                        <Slide1 active={currentSlide === 0} phoneAction={phoneAction} setPhoneAction={setPhoneAction} />
                        <Slide2 active={currentSlide === 1} />
                        <Slide3 active={currentSlide === 2} phoneAction={phoneAction} setPhoneAction={setPhoneAction} />
                        <Slide4 active={currentSlide === 3} phoneAction={phoneAction} setPhoneAction={setPhoneAction} />
                        <Slide5 active={currentSlide === 4} />
                        <Slide6 active={currentSlide === 5} phoneAction={phoneAction} setPhoneAction={setPhoneAction} />
                    </div>

                    {/* Floating Controls with high contrast & premium active slide indicator dots */}
                    <div className="nav-controls">
                        <button onClick={prevSlide} className="nav-btn">
                            <i className="ph-bold ph-arrow-left"></i> Anterior
                        </button>
                        
                        <div className="flex gap-2">
                            {Array.from({ length: totalSlides }).map((_, idx) => (
                                <div 
                                    key={idx} 
                                    onClick={() => setCurrentSlide(idx)}
                                    className={`w-2.5 h-2.5 rounded-full cursor-pointer transition-all duration-300 ${
                                        idx === currentSlide 
                                        ? 'bg-c-01 w-6 shadow-[0_0_8px_#3B82F6]' 
                                        : 'bg-gray-600 hover:bg-gray-400'
                                    }`}
                                />
                            ))}
                        </div>

                        <span className="text-gray-400 font-bold text-sm px-1 border-l border-r border-white/10">
                            Slide {currentSlide + 1} de {totalSlides}
                        </span>
                        
                        <button onClick={nextSlide} className="nav-btn">
                            Próximo <i className="ph-bold ph-arrow-right"></i>
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
