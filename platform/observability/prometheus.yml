# Frente 16 — scrape config (Prometheus)
# Serviços expõem /metrics quando instrumentados; health endpoints para blackbox opcional.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 30s

  external_labels:
    cluster: regenera-bank
    frente: "16-platform-engineering"

rule_files: []

scrape_configs:
  - job_name: core-bank
    metrics_path: /metrics
    static_configs:
      - targets: ['core-bank:3100']
        labels:
          service: core-bank
          tier: domain

  - job_name: web-bff
    metrics_path: /metrics
    static_configs:
      - targets: ['web-bff:3200']
        labels:
          service: web-bff
          tier: bff

  - job_name: mobile-bff
    metrics_path: /metrics
    static_configs:
      - targets: ['mobile-bff:3201']
        labels:
          service: mobile-bff
          tier: bff

  - job_name: operations-bff
    metrics_path: /metrics
    static_configs:
      - targets: ['operations-bff:3202']
        labels:
          service: operations-bff
          tier: bff

  - job_name: partner-api-facade
    metrics_path: /metrics
    static_configs:
      - targets: ['partner-api-facade:3300']
        labels:
          service: partner-api-facade
          tier: bff

  - job_name: outbox-relay
    metrics_path: /metrics
    static_configs:
      - targets: ['outbox-relay:3109']
        labels:
          service: outbox-relay
          tier: worker

  - job_name: health-probes
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://core-bank:3100/v1/health
          - http://web-bff:3200/v1/health
          - http://mobile-bff:3201/health/live
          - http://operations-bff:3202/v1/health
          - http://partner-api-facade:3300/v1/health
          - http://outbox-relay:3109/health
          - http://web-banking:8080/health
        labels:
          probe: http
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115