# @regenera/bank-core
# Senior HPA Configuration
# Behavior: Rapid scale-up to handle traffic bursts (e.g., PIX peak times), graceful scale-down.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bank-backend-hpa
  namespace: bank-production
  labels:
    app: bank-backend
    tier: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bank-backend
  minReplicas: 3
  maxReplicas: 100
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
