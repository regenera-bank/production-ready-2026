name: Bank Grade CI — dinheiro não aceita erro

# se passar aqui, pode mexer com dinheiro.
# se não passar, não chega perto de produção.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: bank-grade-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  POSTGRES_DB: regenera_test
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/regenera_test
  NODE_ENV: test
  CI: "true"

jobs:
  backend_validation:
    name: backend — se passar aqui, pode mexer com dinheiro
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: regenera_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d regenera_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: instalar dependências
        run: npm ci

      # repo sem regra vira incidente silencioso
      - name: repo gate
        run: |
          set -euo pipefail
          ./tooling/repository/repo-gates.sh

      # sem banco, sem verdade
      - name: esperar postgres
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: |
          set -euo pipefail
          for i in {1..40}; do
            if pg_isready -h localhost -U postgres -d regenera_test; then exit 0; fi
            sleep 1
          done
          echo "banco não respondeu. sem banco, sem verdade."
          exit 1

      # migration na ordem canônica. schema sem origem é mentira.
      - name: aplicar migrations
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(database/migrations/sql/*.sql)
          if [ ${#files[@]} -eq 0 ]; then
            echo "nenhuma migration. schema sem origem é mentira."
            exit 1
          fi
          for f in "${files[@]}"; do
            echo "executando $f"
            psql -v ON_ERROR_STOP=1 -h localhost -U postgres -d regenera_test -f "$f"
          done

      # migration que não roda duas vezes quebra no primeiro deploy sério
      - name: reaplicar migrations (idempotência de schema)
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: |
          set -euo pipefail
          for f in database/migrations/sql/*.sql; do
            psql -v ON_ERROR_STOP=1 -h localhost -U postgres -d regenera_test -f "$f"
          done

      - name: typecheck
        run: npm run typecheck --if-present

      - name: lint
        run: npm run lint --if-present

      - name: testes unitários
        run: npm test --if-present -- --runInBand

      # duas requisições iguais não é edge case, é o padrão
      - name: concorrência
        run: node tooling/database/test-concurrency.js

      # mesma request não pode gerar dois efeitos
      - name: idempotência
        run: node tooling/database/test-idempotency.js

      # se passar duas vezes, não é retry, é dinheiro duplicado
      - name: replay
        run: node tooling/database/test-replay.js

      # processo morre no meio; sistema precisa sobreviver
      - name: crash
        run: node tooling/database/test-crash.js

      # dinheiro não aceita erro de soma
      - name: auditoria do ledger
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: |
          set -euo pipefail
          psql -v ON_ERROR_STOP=1 -h localhost -U postgres -d regenera_test <<'SQL'
          DO $$
          DECLARE broken bigint;
          BEGIN
            -- entrada sem linha não existe
            SELECT COUNT(*) INTO broken
            FROM ledger_entries e
            WHERE NOT EXISTS (SELECT 1 FROM ledger_lines l WHERE l.entry_id = e.id);
            IF broken > 0 THEN RAISE EXCEPTION 'entries sem linhas: %', broken; END IF;

            -- débito e crédito fecham ou o dinheiro mente
            SELECT COUNT(*) INTO broken FROM (
              SELECT entry_id,
                SUM(CASE WHEN direction='DEBIT' THEN amount_cents ELSE -amount_cents END) s
              FROM ledger_lines
              GROUP BY entry_id
              HAVING SUM(CASE WHEN direction='DEBIT' THEN amount_cents ELSE -amount_cents END) <> 0
            ) x;
            IF broken > 0 THEN RAISE EXCEPTION 'ledger desbalanceado: %', broken; END IF;
          END $$;
          SQL

      # se não reconstrói, nunca foi consistente
      - name: reconstrução do ledger
        run: node tooling/database/rebuild-ledger.js

      - name: Generate SBOM (CycloneDX & SPDX)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          file: sbom.cyclonedx.json

      - name: Sign Release with Cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v3
