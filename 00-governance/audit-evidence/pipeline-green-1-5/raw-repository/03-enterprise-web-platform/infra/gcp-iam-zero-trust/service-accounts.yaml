# @regenera/bank-core Service Account Blueprint - Zero Trust Enterprise
# Defines strict, single-purpose Service Accounts.

serviceAccounts:
  - name: "ledger-service-sa"
    displayName: "Ledger Microservice Account"
    description: "SA for core banking ledger service (Strict BACEN scope)"
    roles:
      - "roles/cloudsql.client"
      - "roles/pubsub.publisher"
      - "roles/spanner.databaseUser"
      - "roles/cloudtrace.agent"
      - "roles/monitoring.metricWriter"

  - name: "kyc-service-sa"
    displayName: "KYC Microservice Account"
    description: "SA for KYC engine and external compliance integrations (LGPD scope)"
    roles:
      - "roles/storage.objectViewer" # Read-only for docs
      - "roles/secretmanager.secretAccessor"
      - "roles/dlp.user" # Data Loss Prevention API access
      - "roles/cloudtrace.agent"
      - "roles/monitoring.metricWriter"

  - name: "neural-engine-sa"
    displayName: "Neural Core Service Account"
    description: "SA for Gemini AI integrations and analytics"
    roles:
      - "roles/aiplatform.user"
      - "roles/bigquery.dataEditor"
      - "roles/pubsub.subscriber"
      - "roles/cloudtrace.agent"
      - "roles/monitoring.metricWriter"
  
  - name: "pix-gateway-sa"
    displayName: "PIX Gateway Account"
    description: "SA dedicated entirely to BACEN PIX integrations"
    roles:
      - "roles/pubsub.publisher"
      - "roles/secretmanager.secretAccessor"
      - "roles/cloudtrace.agent"
      - "roles/monitoring.metricWriter"
