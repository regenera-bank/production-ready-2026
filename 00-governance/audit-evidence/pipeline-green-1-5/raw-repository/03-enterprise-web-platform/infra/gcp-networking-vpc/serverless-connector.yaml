# @regenera/bank-core
# Senior Serverless VPC Access Connector Configuration
# Ensures Cloud Run/Functions can securely access internal VPC resources (DBs, Redis) without public IPs.
name: projects/MY_PROJECT/locations/southamerica-east1/connectors/bank-vpc-con
network: projects/MY_PROJECT/global/networks/bank-vpc
subnet:
  name: serverless-subnet
  projectId: MY_PROJECT
machineType: e2-micro
minInstances: 2
maxInstances: 10
# Cloud Router/NAT must be configured on the VPC to allow external egress from this connector
