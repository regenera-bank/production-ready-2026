# @regenera/bank-core
# Senior GKE Deployment Configuration
# Security: seccomp profiles, non-root user, read-only root fs, dropping capabilities
# Reliability: pod anti-affinity, readiness/liveness probes, resource requests/limits
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-backend
  namespace: bank-production
  labels:
    app: bank-backend
    tier: api
    compliance: bacen
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bank-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bank-backend
        tier: api
      annotations:
        seccomp.security.alpha.kubernetes.io/pod: "runtime/default"
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
    spec:
      serviceAccountName: backend-ksa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - bank-backend
                topologyKey: "kubernetes.io/hostname"
      containers:
        - name: backend-container
          image: southamerica-east1-docker.pkg.dev/MY_PROJECT/bank-repo/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: "1000m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 3
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            successThreshold: 1
            failureThreshold: 3
            timeoutSeconds: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: tmp-volume
          emptyDir: {}
