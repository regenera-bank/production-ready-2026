# @regenera/bank-core
# Google Cloud Build configuration for Zero-Trust CI/CD Pipeline
# Security: Integrates Trivy/Snyk scanning, build attestations, and Binary Authorization

steps:
  # 1. Dependency Vulnerability Scan (SAST)
  - name: 'aquasec/trivy:latest'
    id: 'sast-scan'
    args:
      - 'fs'
      - '--exit-code=1'
      - '--severity=HIGH,CRITICAL'
      - '--no-progress'
      - '.'
    waitFor: ['-']

  # 2. Extract Cache for Docker (performance)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'pull-cache'
    entrypoint: 'bash'
    args: ['-c', 'docker pull southamerica-east1-docker.pkg.dev/$PROJECT_ID/bank-repo/backend:latest || exit 0']
    waitFor: ['sast-scan']

  # 3. Build Container Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args: 
      - 'build'
      - '--cache-from=southamerica-east1-docker.pkg.dev/$PROJECT_ID/bank-repo/backend:latest'
      - '-t'
      - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/bank-repo/backend:$COMMIT_SHA'
      - '-t'
      - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/bank-repo/backend:latest'
      - '-f'
      - 'infra/gcp-cloud-run/Dockerfile'
      - '.'
    waitFor: ['pull-cache']

  # 4. Container Image Vulnerability Scan
  - name: 'aquasec/trivy:latest'
    id: 'image-scan'
    args:
      - 'image'
      - '--exit-code=1'
      - '--severity=CRITICAL'
      - '--no-progress'
      - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/bank-repo/backend:$COMMIT_SHA'
    waitFor: ['build-image']

  # 5. Push Image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args: ['push', 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/bank-repo/backend', '--all-tags']
    waitFor: ['image-scan']

  # 6. Apply Binary Authorization Attestation
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: 'attest-image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud beta container binauthz attestations sign-and-create \
          --project="$PROJECT_ID" \
          --artifact-url="southamerica-east1-docker.pkg.dev/$PROJECT_ID/bank-repo/backend:$COMMIT_SHA" \
          --attestor="projects/$PROJECT_ID/attestors/build-attestor" \
          --attestor-project="$PROJECT_ID" \
          --keyversion="projects/$PROJECT_ID/locations/southamerica-east1/keyRings/binauthz-keys/cryptoKeys/attestor-key/cryptoKeyVersions/1"
    waitFor: ['push-image']

  # 7. Deploy to Cloud Run (Zero-Trust specific configs)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: 'deploy-cloud-run'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        chmod +x infra/gcp-cloud-run/deploy-backend.sh
        infra/gcp-cloud-run/deploy-backend.sh \
          --image="southamerica-east1-docker.pkg.dev/$PROJECT_ID/bank-repo/backend:$COMMIT_SHA" \
          --service="regenera-backend"
    waitFor: ['attest-image']

images:
  - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/bank-repo/backend:$COMMIT_SHA'
  - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/bank-repo/backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  requestedVerifyOption: VERIFIED
  machineType: 'E2_HIGHCPU_8'

tags: ['production', 'backend', 'banking']
