<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UX Flow — Regenera Bank Enterprise v4.0</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f4f5f7;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: #0a0a1a;
    color: #fff;
    padding: 24px 48px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 2px solid #00ffff30;
  }
  .header-logo {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #00ffff;
    font-weight: 700;
    text-transform: uppercase;
  }
  .header-title {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.05em;
  }
  .header-badge {
    margin-left: auto;
    background: #00ffff15;
    border: 1px solid #00ffff40;
    color: #00ffff;
    font-size: 10px;
    letter-spacing: 0.2em;
    padding: 4px 12px;
    border-radius: 20px;
    text-transform: uppercase;
    font-weight: 700;
  }

  /* ── Legend ── */
  .legend {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 12px 48px;
    display: flex;
    gap: 24px;
    align-items: center;
    font-size: 11px;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .legend-line {
    width: 24px; height: 3px; border-radius: 2px;
  }

  /* ── Canvas ── */
  .canvas {
    padding: 40px 48px 80px;
    overflow-x: auto;
  }

  /* ── Flow diagram SVG wrapper ── */
  .flow-svg {
    display: block;
    margin: 0 auto;
  }

  /* ── Phone wireframe styles ── */
  .phone-body { fill: #1a1a2e; stroke: #2a2a4a; stroke-width: 2; rx: 12; }
  .phone-screen { fill: #0d0d1f; }
  .phone-notch { fill: #0a0a15; }

  /* Colors */
  .c-cyan { color: #00ffff; }
  .c-green { color: #00ff88; }
  .c-amber { color: #ffaa00; }
  .c-red { color: #ff4455; }

  /* screen number circle */
  .step-num {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }

</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">Regenera Bank · Enterprise v4.0</div>
    <div class="header-title">UX Flow — Jornada do Usuário Completa</div>
  </div>
  <div class="header-badge">Design System</div>
</div>

<div class="legend">
  <strong style="font-size:11px;color:#555;">LEGENDA:</strong>
  <div class="legend-item">
    <div class="legend-dot" style="background:#e53935;"></div>
    <span>Fluxo principal</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#fb8c00;"></div>
    <span>Ação secundária / Erro</span>
  </div>

<div class="canvas">

    <linearGradient id="grad-amber-screen" x1="0" y1="0" x2="0" y2="1">
