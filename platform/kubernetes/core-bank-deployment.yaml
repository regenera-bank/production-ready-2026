apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-bank
  namespace: regenera-bank
  labels:
    app: core-bank
    tier: domain
spec:
  replicas: 2
  selector:
    matchLabels:
      app: core-bank
  template:
    metadata:
      labels:
        app: core-bank
        tier: domain
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: core-bank
          image: regenera/core-bank:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3100
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3100"
            - name: CORE_BANK_STORAGE
              value: postgres
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: regenera-database
                  key: url
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: core-bank
  namespace: regenera-bank
  labels:
    app: core-bank
spec:
  selector:
    app: core-bank
  ports:
    - name: http
      port: 3100
      targetPort: http
  type: ClusterIP